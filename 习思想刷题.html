<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>习思想复习题库</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --c-bg: #f5f0eb;
  --c-card: #fff;
  --c-primary: #8b1a1a;
  --c-primary-light: #a52a2a;
  --c-accent: #c41230;
  --c-text: #2c2c2c;
  --c-text-light: #666;
  --c-border: #e0d5c7;
  --c-correct: #2d7d46;
  --c-correct-bg: #e8f5e9;
  --c-wrong: #c62828;
  --c-wrong-bg: #ffebee;
  --c-tag: #f0e6d8;
  --shadow: 0 2px 8px rgba(0,0,0,0.06);
  --radius: 10px;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
  background: var(--c-bg);
  color: var(--c-text);
  line-height: 1.7;
  min-height: 100vh;
}
.container { max-width: 800px; margin: 0 auto; padding: 16px; }

/* Header */
.header {
  background: var(--c-primary);
  color: #fff;
  padding: 16px 20px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
.header h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: 0.5px; }
.header .sub { font-size: 0.8rem; opacity: 0.85; margin-top: 2px; }

/* Navigation */
.nav {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  background: var(--c-card);
  border-bottom: 1px solid var(--c-border);
  overflow-x: auto;
  position: sticky;
  top: 60px;
  z-index: 99;
}
.nav a {
  white-space: nowrap;
  padding: 6px 14px;
  border-radius: 20px;
  text-decoration: none;
  font-size: 0.85rem;
  color: var(--c-text-light);
  background: var(--c-tag);
  transition: all 0.2s;
}
.nav a.active, .nav a:hover { background: var(--c-primary); color: #fff; }

/* Cards */
.card {
  background: var(--c-card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px;
  margin-bottom: 16px;
}
.card h2 { font-size: 1.1rem; margin-bottom: 12px; color: var(--c-primary); }

/* Buttons */
.btn {
  display: inline-block;
  padding: 10px 22px;
  border: none;
  border-radius: 8px;
  font-size: 0.95rem;
  cursor: pointer;
  text-decoration: none;
  text-align: center;
  transition: all 0.2s;
  font-weight: 500;
}
.btn-primary { background: var(--c-primary); color: #fff; }
.btn-primary:hover { background: var(--c-primary-light); }
.btn-outline { background: #fff; color: var(--c-primary); border: 1.5px solid var(--c-primary); }
.btn-outline:hover { background: #fdf2f2; }
.btn-danger { background: #fff; color: var(--c-wrong); border: 1.5px solid var(--c-wrong); }
.btn-danger:hover { background: var(--c-wrong-bg); }
.btn-sm { padding: 5px 12px; font-size: 0.8rem; }
.btn-block { display: block; width: 100%; }
.btn-group { display: flex; gap: 10px; flex-wrap: wrap; }

/* Home stats */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
.stat-item {
  background: var(--c-tag);
  border-radius: var(--radius);
  padding: 14px;
  text-align: center;
}
.stat-item .num { font-size: 1.8rem; font-weight: 700; color: var(--c-primary); }
.stat-item .label { font-size: 0.8rem; color: var(--c-text-light); margin-top: 2px; }

/* Quiz */
.quiz-progress {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  font-size: 0.85rem;
  color: var(--c-text-light);
}
.progress-bar {
  height: 4px;
  background: var(--c-border);
  border-radius: 2px;
  margin-bottom: 20px;
  overflow: hidden;
}
.progress-bar .fill {
  height: 100%;
  background: var(--c-primary);
  border-radius: 2px;
  transition: width 0.3s;
}

.question-block { margin-bottom: 20px; }
.question-num {
  font-size: 0.85rem;
  color: var(--c-primary);
  font-weight: 600;
  margin-bottom: 6px;
}
.question-text { font-size: 1rem; line-height: 1.8; }

.options { margin: 16px 0; }
.option {
  display: block;
  width: 100%;
  text-align: left;
  padding: 12px 16px;
  margin-bottom: 8px;
  border: 1.5px solid var(--c-border);
  border-radius: 8px;
  background: #fff;
  cursor: pointer;
  transition: all 0.15s;
  font-size: 0.95rem;
  line-height: 1.6;
}
.option:hover { border-color: var(--c-primary); background: #fdf8f6; }
.option.selected { border-color: var(--c-primary); background: #fdf2f2; }
.option.correct { border-color: var(--c-correct); background: var(--c-correct-bg); color: var(--c-correct); }
.option.wrong { border-color: var(--c-wrong); background: var(--c-wrong-bg); color: var(--c-wrong); }
.option.disabled { pointer-events: none; opacity: 0.85; }
.option-label {
  display: inline-block;
  width: 28px;
  height: 28px;
  line-height: 28px;
  text-align: center;
  border-radius: 50%;
  background: var(--c-tag);
  margin-right: 10px;
  font-weight: 600;
  font-size: 0.85rem;
}
.option.correct .option-label { background: var(--c-correct); color: #fff; }
.option.wrong .option-label { background: var(--c-wrong); color: #fff; }
.option.selected .option-label { background: var(--c-primary); color: #fff; }

/* Checkbox style for multiple */
.option input[type="checkbox"] { display: none; }
.option .check-mark {
  display: inline-block;
  width: 28px;
  height: 28px;
  line-height: 28px;
  text-align: center;
  border-radius: 4px;
  background: var(--c-tag);
  margin-right: 10px;
  font-weight: 600;
  font-size: 0.85rem;
  vertical-align: middle;
}
.option.selected .check-mark { background: var(--c-primary); color: #fff; }
.option.correct .check-mark { background: var(--c-correct); color: #fff; }
.option.wrong .check-mark { background: var(--c-wrong); color: #fff; }

.feedback {
  padding: 12px 16px;
  border-radius: 8px;
  margin: 12px 0;
  font-size: 0.9rem;
  display: none;
}
.feedback.show { display: block; }
.feedback.correct-fb { background: var(--c-correct-bg); color: var(--c-correct); }
.feedback.wrong-fb { background: var(--c-wrong-bg); color: var(--c-wrong); }

.quiz-nav { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }

/* Stats table */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
th, td { padding: 8px 10px; text-align: center; border-bottom: 1px solid var(--c-border); }
th { background: var(--c-tag); font-weight: 600; white-space: nowrap; position: sticky; top: 0; }
td { white-space: nowrap; }
tr:hover td { background: #fdf8f6; }
.acc-high { color: var(--c-correct); font-weight: 600; }
.acc-mid { color: #e67e22; font-weight: 600; }
.acc-low { color: var(--c-wrong); font-weight: 600; }
.text-left { text-align: left; white-space: normal; max-width: 300px; }

/* Page visibility */
.page { display: none; }
.page.active { display: block; }

/* Empty state */
.empty { text-align: center; padding: 40px 20px; color: var(--c-text-light); }
.empty .icon { font-size: 3rem; margin-bottom: 12px; }

/* Responsive */
@media (max-width: 600px) {
  .container { padding: 10px; }
  .card { padding: 14px; }
  .header h1 { font-size: 1.1rem; }
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
  .btn { padding: 8px 16px; font-size: 0.9rem; }
}

/* Tag for question type */
.tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.75rem;
  font-weight: 600;
}
.tag-single { background: #e3f2fd; color: #1565c0; }
.tag-multiple { background: #fff3e0; color: #e65100; }

/* Loading overlay */
.loading { text-align: center; padding: 60px 20px; color: var(--c-text-light); }
</style>
</head>

// ========== STORAGE KEYS ==========
const STATS_KEY = 'xjp-xi-quiz-stats-v1';
const HISTORY_KEY = 'xjp-xi-quiz-attempts-v1';

// ========== HELPERS ==========
function loadStats() {
  try {
    const raw = localStorage.getItem(STATS_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) { return {}; }
}

function saveStats(stats) {
  localStorage.setItem(STATS_KEY, JSON.stringify(stats));
}

function loadHistory() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) { return []; }
}

function saveHistory(history) {
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
}

function getQuestionById(id) {
  return QUESTIONS.find(q => q.id === id);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ========== ROUTER ==========
function navigate(hash) {
  window.location.hash = hash || '#home';
}

function getPage() {
  return window.location.hash.replace('#', '') || 'home';
}

function render() {
  const page = getPage();
  document.querySelectorAll('#mainNav a').forEach(a => {
    a.classList.toggle('active', a.getAttribute('href') === '#' + page);
  });
  const app = document.getElementById('app');
  switch(page) {
    case 'home': renderHome(app); break;
    case 'quiz': renderQuiz(app); break;
    case 'wrong': renderWrong(app); break;
    case 'stats': renderStats(app); break;
    case 'history': renderHistory(app); break;
    default: renderHome(app);
  }
}

window.addEventListener('hashchange', render);

// ========== HOME PAGE ==========
function renderHome(app) {
  const stats = loadStats();
  const total = QUESTIONS.length;
  let attempted = 0, totalCorrect = 0, totalAttempts = 0;
  const wrongIds = [];
  for (const q of QUESTIONS) {
    const s = stats[q.id];
    if (s && s.attempts > 0) {
      attempted++;
      totalCorrect += s.correct;
      totalAttempts += s.attempts;
      if (s.wrongRate > 30) wrongIds.push(q.id);
    }
  }
  const accuracy = totalAttempts > 0 ? Math.round(totalCorrect / totalAttempts * 100) : 0;

  app.innerHTML = `
    <div class="card">
      <h2>📖 学习状态</h2>
      <div class="stat-grid">
        <div class="stat-item">
          <div class="num">${total}</div>
          <div class="label">题库总数</div>
        </div>
        <div class="stat-item">
          <div class="num">${attempted}</div>
          <div class="label">已作答</div>
        </div>
        <div class="stat-item">
          <div class="num">${accuracy}%</div>
          <div class="label">正确率</div>
        </div>
        <div class="stat-item">
          <div class="num">${wrongIds.length}</div>
          <div class="label">错题集</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>🚀 开始刷题</h2>
      <div class="btn-group" style="flex-direction: column;">
        <a class="btn btn-primary btn-block" href="#quiz">📝 作答完整题库（${total} 题）</a>
        <a class="btn btn-outline btn-block" href="#wrong">🎯 作答错题集（${wrongIds.length} 题）</a>
        <a class="btn btn-outline btn-block" href="#stats">📊 查看各题作答情况</a>
        <a class="btn btn-outline btn-block" href="#history">📋 查看作答记录</a>
      </div>
    </div>

    <div class="card" style="text-align:center;">
      <p style="color:var(--c-text-light); font-size:0.85rem; margin-bottom:10px;">
        数据保存在浏览器本地存储中，备份文件为同目录下的 <code>习思想题库备份.json</code>
      </p>
      <div class="btn-group" style="justify-content:center;">
        <button class="btn btn-outline btn-sm" onclick="exportData()">📥 导出备份</button>
        <button class="btn btn-outline btn-sm" onclick="autoLoadBackup()">🔄 加载备份</button>
        <button class="btn btn-outline btn-sm" onclick="document.getElementById('importFile').click()">📤 选择文件导入</button>
        <button class="btn btn-danger btn-sm" onclick="clearAllData()">🗑 清空记录</button>
      </div>
      <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importData(event)">
    </div>
  `;
}

function clearAllData() {
  if (confirm('确定要清空所有本机记录吗？\n\n这将删除：\n- 所有作答统计\n- 所有错题记录\n- 所有作答历史\n\n此操作不可恢复！')) {
    localStorage.removeItem(STATS_KEY);
    localStorage.removeItem(HISTORY_KEY);
    render();
  }
}

const BACKUP_FILENAME = '习思想题库备份.json';

function exportData() {
  const data = { exportedAt: new Date().toLocaleString('zh-CN',{hour12:false}), stats: loadStats(), history: loadHistory() };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = BACKUP_FILENAME;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function autoLoadBackup() {
  try {
    const resp = await fetch('./' + BACKUP_FILENAME);
    if (!resp.ok) { alert(`❌ 未找到备份文件 "${BACKUP_FILENAME}"，请先导出备份或使用"选择文件导入"。`); return; }
    const data = await resp.json();
    if (!data.stats || !data.history) { alert('❌ 文件格式不正确。'); return; }
    if (!confirm(`确定要从 "${BACKUP_FILENAME}" 恢复备份数据吗？\n\n导出时间：${data.exportedAt || '未知'}\n统计题目数：${Object.keys(data.stats).length}\n作答记录数：${data.history.length}\n\n当前的所有记录将被覆盖！`)) return;
    saveStats(data.stats); saveHistory(data.history);
    alert(`✅ 备份恢复成功！`);
    render();
  } catch (err) { alert(`❌ 加载失败：${err.message}`); }
}

async function autoLoadOnStartup() {
  const stats = loadStats();
  const history = loadHistory();
  if (Object.keys(stats).length > 0 || history.length > 0) return;
  try {
    const resp = await fetch('./' + BACKUP_FILENAME);
    if (!resp.ok) return;
    const data = await resp.json();
    if (data.stats && data.history) {
      saveStats(data.stats);
      saveHistory(data.history);
      console.log('✅ 已自动加载备份文件:', BACKUP_FILENAME, '导出时间:', data.exportedAt);
    }
  } catch (e) { /* 静默失败，用户可手动加载 */ }
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (!confirm(`确定要从 "${file.name}" 恢复备份数据吗？\n\n当前的所有记录将被覆盖！`)) { event.target.value = ''; return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.stats && data.history) {
        saveStats(data.stats); saveHistory(data.history);
        alert(`✅ 备份恢复成功！\n\n导出时间：${data.exportedAt || '未知'}\n统计题目数：${Object.keys(data.stats).length}\n作答记录数：${data.history.length}`);
        render();
      } else { alert('❌ 文件格式不正确，缺少 stats 或 history 数据。'); }
    } catch (err) { alert('❌ 无法解析该文件，请确保选择的是导出的 JSON 备份文件。'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ========== QUIZ PAGE (full) ==========
let quizQuestions = [];
let quizIndex = 0;
let quizAnswered = {}; // id -> true (已作答)

function renderQuiz(app) {
  // Prepare questions: all singles first (shuffled), then all multis (shuffled)
  const singles = shuffle(QUESTIONS.filter(q => q.type === 'single'));
  const multis = shuffle(QUESTIONS.filter(q => q.type === 'multiple'));
  quizQuestions = [...singles, ...multis];
  quizIndex = 0;
  quizAnswered = {};
  renderQuizQuestion(app);
}

function renderWrong(app) {
  const stats = loadStats();
  const wrongIds = [];
  for (const q of QUESTIONS) {
    const s = stats[q.id];
    if (s && s.attempts > 0 && s.wrongRate > 30) {
      wrongIds.push(q.id);
    }
  }
  if (wrongIds.length === 0) {
    app.innerHTML = `
      <div class="card">
        <h2>🎯 错题集</h2>
        <div class="empty">
          <div class="icon">🎉</div>
          <p>太棒了！当前没有错误率超过 30% 的题目。</p>
          <p style="margin-top:8px;">继续加油，保持状态！</p>
          <a class="btn btn-primary" href="#home" style="margin-top:16px;">返回首页</a>
        </div>
      </div>
    `;
    return;
  }
  // Separate singles and multis, shuffle each
  const wrongSingles = shuffle(wrongIds.filter(id => id.startsWith('single-')).map(id => getQuestionById(id)));
  const wrongMultis = shuffle(wrongIds.filter(id => id.startsWith('multiple-')).map(id => getQuestionById(id)));
  quizQuestions = [...wrongSingles, ...wrongMultis];
  quizIndex = 0;
  quizAnswered = {};
  renderQuizQuestion(app);
}

function renderQuizQuestion(app) {
  if (quizIndex >= quizQuestions.length) {
    renderQuizComplete(app);
    return;
  }
  const q = quizQuestions[quizIndex];
  const total = quizQuestions.length;
  const progress = Math.round(((quizIndex + 1) / total) * 100);

  const typeLabel = q.type === 'single' ? '单选题' : '多选题';
  const typeTagClass = q.type === 'single' ? 'tag-single' : 'tag-multiple';
  const hint = q.type === 'single' ? '点击选项直接作答' : '勾选后点击"提交本题"';
  const keyHint = '⌨ 键盘 1-4 选选项 · Enter 提交 · ← → 翻题';

  let optionsHTML = '';
  for (const opt of q.options) {
    if (q.type === 'single') {
      optionsHTML += `
        <button class="option" data-label="${opt.label}" onclick="selectSingleOption(this)">
          <span class="option-label">${opt.label}</span>${opt.text}
        </button>`;
    } else {
      optionsHTML += `
        <label class="option" data-label="${opt.label}">
          <input type="checkbox" value="${opt.label}" onchange="toggleMultiOption(this)">
          <span class="check-mark">${opt.label}</span>${opt.text}
        </label>`;
    }
  }

  const alreadyAnswered = quizAnswered[q.id];

  app.innerHTML = `
    <div class="card">
      <div class="quiz-progress">
        <span><span class="tag ${typeTagClass}">${typeLabel}</span> 第 ${q.sourceOrder} 题</span>
        <span>${quizIndex + 1} / ${total}</span>
      </div>
      <div style="text-align:center; font-size:0.7rem; color:var(--c-text-light); margin-bottom:10px;">${keyHint}</div>
      <div class="progress-bar"><div class="fill" style="width:${progress}%"></div></div>

      <div class="question-block">
        <div class="question-text">${q.question}</div>
      </div>

      <div class="options" id="optionsContainer">
        ${optionsHTML}
      </div>

      <div class="feedback" id="feedback"></div>

      <div class="quiz-nav" id="quizNav">
        ${quizIndex > 0 ? `<button class="btn btn-outline" onclick="prevQuestion()">← 上一题</button>` : '<span style="width:90px;display:inline-block;"></span>'}
        ${!alreadyAnswered && q.type === 'multiple' ? `<button class="btn btn-primary" onclick="submitMultiple('${q.id}')">✅ 提交本题</button>` : ''}
        ${!alreadyAnswered && q.type === 'single' ? `<button class="btn btn-primary" onclick="submitSingle('${q.id}')">✅ 提交本题</button>` : ''}
        ${alreadyAnswered ? '<span style="font-size:0.85rem;color:var(--c-text-light);">本题已作答</span>' : ''}
        ${quizIndex < total - 1 ? `<button class="btn btn-outline" onclick="nextQuestion()">下一题 →</button>` : `<button class="btn btn-outline" onclick="nextQuestion()">完成 →</button>`}
      </div>
    </div>
  `;
}

function answerSingle(qid, label, btnEl) {
  if (quizAnswered[qid]) return; // Already answered
  quizAnswered[qid] = true;

  const q = getQuestionById(qid);
  const isCorrect = q.answer === label;

  // Disable all options
  const container = document.getElementById('optionsContainer');
  container.querySelectorAll('.option').forEach(el => el.classList.add('disabled'));

  // Mark selected
  btnEl.classList.add('selected');

  // Find correct answer option
  const correctOpt = container.querySelector(`[data-label="${q.answer}"]`);
  if (correctOpt) correctOpt.classList.add('correct');
  if (!isCorrect && correctOpt !== btnEl) btnEl.classList.add('wrong');
  if (isCorrect) btnEl.classList.add('correct');

  // Show feedback
  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (isCorrect ? 'correct-fb' : 'wrong-fb');
  fb.innerHTML = isCorrect
    ? '✅ 回答正确！'
    : `❌ 回答错误。正确答案是 <strong>${q.answer}</strong>。`;

  // Update quiz nav
  document.getElementById('quizNav').innerHTML = `
    ${quizIndex > 0 ? `<button class="btn btn-outline" onclick="prevQuestion()">← 上一题</button>` : '<span style="width:90px;display:inline-block;"></span>'}
    <span style="font-size:0.85rem;color:var(--c-text-light);">本题已作答</span>
    ${quizIndex < quizQuestions.length - 1 ? `<button class="btn btn-outline" onclick="nextQuestion()">下一题 →</button>` : `<button class="btn btn-outline" onclick="nextQuestion()">完成 →</button>`}
  `;

  // Record stats
  recordAttempt(q, label, isCorrect);
}

function submitSingle(qid) {
  if (quizAnswered[qid]) return;
  const selected = document.querySelector('#optionsContainer .option.selected');
  if (!selected) { alert('请先选择一个选项'); return; }
  quizAnswered[qid] = true;
  const label = selected.getAttribute('data-label');
  const q = getQuestionById(qid);
  const isCorrect = q.answer === label;
  const container = document.getElementById('optionsContainer');
  container.querySelectorAll('.option').forEach(el => el.classList.add('disabled'));
  const correctOpt = container.querySelector(`[data-label="${q.answer}"]`);
  if (correctOpt) correctOpt.classList.add('correct');
  if (!isCorrect && correctOpt !== selected) selected.classList.add('wrong');
  if (isCorrect) selected.classList.add('correct');
  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (isCorrect ? 'correct-fb' : 'wrong-fb');
  fb.innerHTML = isCorrect ? '✅ 回答正确！' : `❌ 回答错误。正确答案是 <strong>${q.answer}</strong>。`;
  document.getElementById('quizNav').innerHTML = `
    ${quizIndex > 0 ? `<button class="btn btn-outline" onclick="prevQuestion()">← 上一题</button>` : '<span style="width:90px;display:inline-block;"></span>'}
    <span style="font-size:0.85rem;color:var(--c-text-light);">本题已作答</span>
    ${quizIndex < quizQuestions.length - 1 ? `<button class="btn btn-outline" onclick="nextQuestion()">下一题 →</button>` : `<button class="btn btn-outline" onclick="nextQuestion()">完成 →</button>`}
  `;
  recordAttempt(q, label, isCorrect);
}

function selectSingleOption(btnEl) {
  const container = document.getElementById('optionsContainer');
  container.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
  btnEl.classList.add('selected');
}

function toggleMultiOption(cb) {
  const label = cb.closest('.option');
  if (cb.checked) {
    label.classList.add('selected');
  } else {
    label.classList.remove('selected');
  }
}

function submitMultiple(qid) {
  if (quizAnswered[qid]) return;
  quizAnswered[qid] = true;

  const q = getQuestionById(qid);
  const container = document.getElementById('optionsContainer');
  const checked = [];
  container.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => checked.push(cb.value));
  checked.sort();
  const userAnswer = checked.join('、') || '(未选)';

  // Parse correct answer
  const correctAnswers = q.answer.split('、').map(s => s.trim()).sort();
  const correctStr = correctAnswers.join('、');
  const isCorrect = checked.length === correctAnswers.length && checked.every((v, i) => v === correctAnswers[i]);

  // Disable and mark
  container.querySelectorAll('.option').forEach(el => el.classList.add('disabled'));
  container.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.disabled = true);

  // Mark each option
  container.querySelectorAll('.option').forEach(el => {
    const lbl = el.getAttribute('data-label');
    if (correctAnswers.includes(lbl)) {
      el.classList.add('correct');
    } else if (checked.includes(lbl)) {
      el.classList.add('wrong');
    }
  });

  // Feedback
  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (isCorrect ? 'correct-fb' : 'wrong-fb');
  fb.innerHTML = isCorrect
    ? '✅ 回答正确！'
    : `❌ 回答错误。正确答案是 <strong>${correctStr}</strong>。你的答案：${userAnswer}`;

  // Update nav
  document.getElementById('quizNav').innerHTML = `
    ${quizIndex > 0 ? `<button class="btn btn-outline" onclick="prevQuestion()">← 上一题</button>` : '<span style="width:90px;display:inline-block;"></span>'}
    <span style="font-size:0.85rem;color:var(--c-text-light);">本题已作答</span>
    ${quizIndex < quizQuestions.length - 1 ? `<button class="btn btn-outline" onclick="nextQuestion()">下一题 →</button>` : `<button class="btn btn-outline" onclick="nextQuestion()">完成 →</button>`}
  `;

  recordAttempt(q, userAnswer, isCorrect);
}

function recordAttempt(q, userAnswer, isCorrect) {
  // Update stats
  const stats = loadStats();
  const sid = q.id;
  if (!stats[sid]) {
    stats[sid] = { attempts: 0, correct: 0, wrong: 0, accuracy: 0, wrongRate: 0 };
  }
  stats[sid].attempts++;
  if (isCorrect) {
    stats[sid].correct++;
  } else {
    stats[sid].wrong++;
  }
  const total = stats[sid].attempts;
  stats[sid].accuracy = Math.round(stats[sid].correct / total * 100);
  stats[sid].wrongRate = Math.round(stats[sid].wrong / total * 100);
  saveStats(stats);

  // Update history
  const history = loadHistory();
  history.unshift({
    time: new Date().toLocaleString('zh-CN', { hour12: false }),
    id: q.id,
    sourceOrder: q.sourceOrder,
    type: q.type === 'single' ? '单选' : '多选',
    userAnswer: userAnswer,
    correctAnswer: q.answer,
    isCorrect: isCorrect
  });
  saveHistory(history);
}

function nextQuestion() {
  quizIndex++;
  renderQuizQuestion(document.getElementById('app'));
}

function prevQuestion() {
  if (quizIndex > 0) {
    quizIndex--;
    renderQuizQuestion(document.getElementById('app'));
  }
}

function renderQuizComplete(app) {
  const total = quizQuestions.length;
  const stats = loadStats();
  let correct = 0;
  for (const q of quizQuestions) {
    const s = stats[q.id];
    // Count the last answer for each question in this session
    // Actually, let's just show the overall stats for attempted questions
  }
  // Count from the session quizAnswered
  let sessionCorrect = 0, sessionTotal = 0;
  for (const qid of Object.keys(quizAnswered)) {
    if (quizAnswered[qid]) {
      sessionTotal++;
      // Find from history - most recent for this id
      const history = loadHistory();

      if (last && last.isCorrect) sessionCorrect++;
    }
  }

  app.innerHTML = `
    <div class="card" style="text-align:center;">
      <h2>🎉 本轮作答完成！</h2>
      <div class="stat-grid" style="margin:20px 0;">
        <div class="stat-item">
          <div class="num">${sessionTotal}</div>
          <div class="label">本轮作答</div>
        </div>
        <div class="stat-item">
          <div class="num">${sessionCorrect}</div>
          <div class="label">本轮正确</div>
        </div>
        <div class="stat-item">
          <div class="num">${sessionTotal > 0 ? Math.round(sessionCorrect / sessionTotal * 100) : 0}%</div>
          <div class="label">本轮正确率</div>
        </div>
      </div>
      <div class="btn-group" style="justify-content:center; margin-top:20px;">
        <a class="btn btn-primary" href="#quiz">🔄 重新作答完整题库</a>
        <a class="btn btn-outline" href="#wrong">🎯 作答错题集</a>
        <a class="btn btn-outline" href="#home">🏠 返回首页</a>
      </div>
    </div>
  `;
}

// ========== STATS PAGE ==========
function renderStats(app) {
  const stats = loadStats();
  const singles = QUESTIONS.filter(q => q.type === 'single');
  const multis = QUESTIONS.filter(q => q.type === 'multiple');

  function buildTable(questions) {
    let rows = '';
    for (const q of questions) {
      const s = stats[q.id];
      const attempts = s ? s.attempts : 0;
      const correct = s ? s.correct : 0;
      const wrong = s ? s.wrong : 0;
      const accuracy = s ? s.accuracy : '-';
      const wrongRate = s ? s.wrongRate : '-';
      let accClass = '';
      if (typeof accuracy === 'number') {
        if (accuracy >= 80) accClass = 'acc-high';
        else if (accuracy >= 50) accClass = 'acc-mid';
        else accClass = 'acc-low';
      }
      let wrClass = '';
      if (typeof wrongRate === 'number') {
        if (wrongRate > 50) wrClass = 'acc-low';
        else if (wrongRate > 30) wrClass = 'acc-mid';
      }
      rows += `
        <tr>
          <td>${q.sourceOrder}</td>
          <td><span class="tag ${q.type === 'single' ? 'tag-single' : 'tag-multiple'}">${q.type === 'single' ? '单选' : '多选'}</span></td>
          <td class="text-left">${q.question.substring(0, 60)}…</td>
          <td>${q.answer}</td>
          <td>${attempts}</td>
          <td>${correct}</td>
          <td>${wrong}</td>
          <td class="${accClass}">${accuracy}${typeof accuracy === 'number' ? '%' : ''}</td>
          <td class="${wrClass}">${wrongRate}${typeof wrongRate === 'number' ? '%' : ''}</td>
        </tr>`;
    }
    return rows;
  }

  app.innerHTML = `
    <div class="card">
      <h2>📊 单选题作答统计（${singles.length} 题）</h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th>#</th><th>类型</th><th>题干</th><th>答案</th><th>作答</th><th>正确</th><th>错误</th><th>正确率</th><th>错误率</th></tr></thead>
          <tbody>${buildTable(singles)}</tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <h2>📊 多选题作答统计（${multis.length} 题）</h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th>#</th><th>类型</th><th>题干</th><th>答案</th><th>作答</th><th>正确</th><th>错误</th><th>正确率</th><th>错误率</th></tr></thead>
          <tbody>${buildTable(multis)}</tbody>
        </table>
      </div>
    </div>
    <div style="text-align:center; padding:10px;">
      <a class="btn btn-outline" href="#home">🏠 返回首页</a>
    </div>
  `;
}

// ========== HISTORY PAGE ==========
function renderHistory(app) {
  const history = loadHistory();
  if (history.length === 0) {
    app.innerHTML = `
      <div class="card">
        <h2>📋 作答记录</h2>
        <div class="empty">
          <div class="icon">📭</div>
          <p>暂无作答记录。</p>
          <a class="btn btn-primary" href="#quiz" style="margin-top:16px;">开始刷题</a>
        </div>
      </div>
    `;
    return;
  }
  let rows = '';
  for (const h of history) {
    const icon = h.isCorrect ? '✅' : '❌';
    rows += `
      <tr>
        <td>${h.time}</td>
        <td>${h.sourceOrder}</td>
        <td><span class="tag ${h.type === '单选' ? 'tag-single' : 'tag-multiple'}">${h.type}</span></td>
        <td>${h.userAnswer}</td>
        <td>${h.correctAnswer}</td>
        <td>${icon}</td>
      </tr>`;
  }
  app.innerHTML = `
    <div class="card">
      <h2>📋 作答记录（共 ${history.length} 条）</h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th>时间</th><th>题号</th><th>类型</th><th>你的答案</th><th>正确答案</th><th>结果</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div style="text-align:center; margin-top:16px;">
        <button class="btn btn-danger btn-sm" onclick="clearHistory()">🗑 清空作答记录</button>
      </div>
    </div>
    <div style="text-align:center; padding:10px;">
      <a class="btn btn-outline" href="#home">🏠 返回首页</a>
    </div>
  `;
}

function clearHistory() {
  if (confirm('确定要清空所有作答记录吗？（不影响统计数据）')) {
    localStorage.setItem(HISTORY_KEY, JSON.stringify([]));
    render();
  }
}

// ========== KEYBOARD NAVIGATION ==========
document.addEventListener('keydown', (e) => {
  const page = getPage();
  if (page !== 'quiz' && page !== 'wrong') return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    if (quizIndex > 0) prevQuestion();
  } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    e.preventDefault();
    if (quizIndex < quizQuestions.length - 1) nextQuestion();
  } else if (e.key === 'Enter') {
    e.preventDefault();
    const q = quizQuestions[quizIndex];
    if (!quizAnswered[q.id]) {
      if (q.type === 'single') submitSingle(q.id);
      else if (q.type === 'multiple') submitMultiple(q.id);
    }
  } else if (e.key >= '1' && e.key <= '4') {
    e.preventDefault();
    const q = quizQuestions[quizIndex];
    if (quizAnswered[q.id]) return;
    const idx = parseInt(e.key) - 1;
    const container = document.getElementById('optionsContainer');
    if (!container) return;
    const options = container.querySelectorAll('.option');
    if (idx >= options.length) return;
    const target = options[idx];
    if (q.type === 'single') {
      // Toggle: if already selected, deselect; otherwise select
      if (target.classList.contains('selected')) {
        target.classList.remove('selected');
      } else {
        container.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
        target.classList.add('selected');
      }
    } else {
      // Multi-choice: toggle checkbox
      const cb = target.querySelector('input[type="checkbox"]');
      if (cb) {
        cb.checked = !cb.checked;
        cb.dispatchEvent(new Event('change', { bubbles: true }));
      }
    }
  }
});

// ========== INIT ==========
document.addEventListener('DOMContentLoaded', () => {
  autoLoadOnStartup().then(() => render());
});
